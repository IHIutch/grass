name: Release napi

on:
  push:
    tags: ["napi-v*"]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            node-suffix: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-14
            node-suffix: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            node-suffix: linux-x64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            node-suffix: linux-x64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            node-suffix: linux-arm64-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            node-suffix: linux-arm64-musl
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            node-suffix: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: crates/napi
        run: npm install

      - name: Install musl-tools
        if: contains(matrix.target, 'musl') && !contains(matrix.target, 'aarch64')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compilation tools
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Build native module
        working-directory: crates/napi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ contains(matrix.target, 'aarch64-unknown-linux-gnu') && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ contains(matrix.target, 'aarch64-unknown-linux-musl') && 'aarch64-linux-gnu-gcc' || '' }}
          CC_aarch64_unknown_linux_gnu: ${{ contains(matrix.target, 'aarch64-unknown-linux-gnu') && 'aarch64-linux-gnu-gcc' || '' }}
          CC_aarch64_unknown_linux_musl: ${{ contains(matrix.target, 'aarch64-unknown-linux-musl') && 'aarch64-linux-gnu-gcc' || '' }}
        run: npx napi build --platform --release --target ${{ matrix.target }}

      # Rename .node file to include platform suffix
      - name: Rename artifact
        working-directory: crates/napi
        shell: bash
        run: |
          for f in *.node; do
            target="grass.${{ matrix.node-suffix }}.node"
            if [ "$f" != "$target" ]; then
              mv "$f" "$target"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.node-suffix }}
          path: crates/napi/grass.${{ matrix.node-suffix }}.node
          if-no-files-found: error

  publish:
    name: Publish ihiutch-grass
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Build WASM
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown
          cd crates/lib
          wasm-pack build --release --target web --out-name grass --no-default-features --features wasm-exports,random

      - name: Copy WASM artifacts to pkg-publish
        run: |
          cp crates/lib/pkg/grass_bg.wasm crates/lib/pkg-publish/
          cp crates/lib/pkg/grass_bg.wasm.d.ts crates/lib/pkg-publish/
          cp crates/lib/pkg/grass.d.ts crates/lib/pkg-publish/
          cp crates/lib/pkg/grass.js crates/lib/pkg-publish/

      - name: Download all native bindings
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts

      - name: Copy native bindings to pkg-publish
        run: |
          for dir in native-artifacts/bindings-*/; do
            cp "$dir"/*.node crates/lib/pkg-publish/
          done
          echo "=== Package contents ==="
          ls -la crates/lib/pkg-publish/*.node crates/lib/pkg-publish/*.wasm

      - name: Publish
        working-directory: crates/lib/pkg-publish
        env:
          NPM_TOKEN: "" # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public
