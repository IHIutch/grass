name: Release napi

on:
  push:
    tags: ['napi-v*']
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: crates/napi
        run: npm install

      - name: Build native module (cross)
        if: matrix.use-cross
        working-directory: crates/napi
        run: npx napi build --platform --release --target ${{ matrix.target }} --use-napi-cross

      - name: Build native module (native)
        if: ${{ !matrix.use-cross }}
        working-directory: crates/napi
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/napi/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: crates/napi
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/napi/artifacts

      - name: Create npm dirs and move artifacts
        working-directory: crates/napi
        run: |
          npx napi create-npm-dirs
          npx napi artifacts --dir artifacts

      - name: List packages
        working-directory: crates/napi
        run: ls -R npm/

      - name: Publish
        working-directory: crates/napi
        run: |
          npx napi prepublish -t npm --no-gh-release
          # Publish platform packages first
          for pkg in npm/*/; do
            if [ -f "$pkg/package.json" ]; then
              echo "Publishing $pkg..."
              npm publish "$pkg" --access public --provenance || true
            fi
          done
          # Publish main package
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
