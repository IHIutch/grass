name: Release napi

on:
  push:
    tags: ['napi-v*']
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        working-directory: crates/napi
        run: npm install

      # Cross-compilation setup for Linux targets
      - name: Install musl-tools
        if: contains(matrix.target, 'musl') && !contains(matrix.target, 'aarch64')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compilation tools
        if: contains(matrix.target, 'aarch64-unknown-linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # musl cross-compiler for aarch64
          if [[ "${{ matrix.target }}" == *"musl"* ]]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Build native module
        working-directory: crates/napi
        env:
          # Set linker for aarch64 cross-compilation
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ contains(matrix.target, 'aarch64-unknown-linux-gnu') && 'aarch64-linux-gnu-gcc' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ contains(matrix.target, 'aarch64-unknown-linux-musl') && 'aarch64-linux-gnu-gcc' || '' }}
          CC_aarch64_unknown_linux_gnu: ${{ contains(matrix.target, 'aarch64-unknown-linux-gnu') && 'aarch64-linux-gnu-gcc' || '' }}
          CC_aarch64_unknown_linux_musl: ${{ contains(matrix.target, 'aarch64-unknown-linux-musl') && 'aarch64-linux-gnu-gcc' || '' }}
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/napi/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: crates/napi
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/napi/artifacts

      - name: Prepare and publish platform packages
        working-directory: crates/napi
        run: |
          echo "=== Downloaded artifacts ==="
          ls -R artifacts/

          node << 'SCRIPT'
          const { execSync } = require("child_process");
          const { mkdirSync, copyFileSync, writeFileSync, readdirSync } = require("fs");
          const { join, basename } = require("path");

          const version = require("./package.json").version;
          const pkgName = "ihiutch-grass-napi";

          const platforms = [
            { target: "x86_64-apple-darwin",        suffix: "darwin-x64",       os: "darwin",  cpu: "x64"   },
            { target: "aarch64-apple-darwin",        suffix: "darwin-arm64",     os: "darwin",  cpu: "arm64" },
            { target: "x86_64-unknown-linux-gnu",    suffix: "linux-x64-gnu",    os: "linux",   cpu: "x64"   },
            { target: "x86_64-unknown-linux-musl",   suffix: "linux-x64-musl",   os: "linux",   cpu: "x64"   },
            { target: "aarch64-unknown-linux-gnu",   suffix: "linux-arm64-gnu",  os: "linux",   cpu: "arm64" },
            { target: "aarch64-unknown-linux-musl",  suffix: "linux-arm64-musl", os: "linux",   cpu: "arm64" },
            { target: "x86_64-pc-windows-msvc",      suffix: "win32-x64-msvc",   os: "win32",   cpu: "x64"   },
          ];

          for (const { target, suffix, os, cpu } of platforms) {
            const artifactDir = join("artifacts", `bindings-${target}`);
            let nodeFile;
            try {
              nodeFile = readdirSync(artifactDir).find(f => f.endsWith(".node"));
            } catch {
              console.log(`⚠ No artifacts for ${target}, skipping`);
              continue;
            }
            if (!nodeFile) { console.log(`⚠ No .node in ${artifactDir}`); continue; }

            const pkgDir = join("npm", suffix);
            mkdirSync(pkgDir, { recursive: true });

            writeFileSync(join(pkgDir, "package.json"), JSON.stringify({
              name: `${pkgName}-${suffix}`,
              version,
              os: [os],
              cpu: [cpu],
              main: nodeFile,
              files: [nodeFile],
              license: "MIT",
              repository: { type: "git", url: "https://github.com/IHIutch/grass" }
            }, null, 2));

            copyFileSync(join(artifactDir, nodeFile), join(pkgDir, nodeFile));
            console.log(`Publishing ${pkgName}-${suffix}@${version}...`);
            try {
              execSync(`npm publish ./${pkgDir} --access public`, { stdio: "inherit" });
            } catch (e) {
              console.log(`⚠ Failed to publish ${suffix}: ${e.message}`);
            }
          }
          SCRIPT

      - name: Publish main package
        working-directory: crates/napi
        run: npm publish --access public
